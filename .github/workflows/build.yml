name: build

on: [push]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v1
    - name: Set up NuGet
      uses: nuget/setup-nuget@v1
    - name: Restore NuGet Packages
      run: nuget restore $Env:GITHUB_WORKSPACE\RBX Alt Manager.sln
    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v1.0.2
    - name: Build the Solution
      run: MSBuild.exe $Env:GITHUB_WORKSPACE\RBX Alt Manager.sln -p:Configuration=Release
      timeout-minutes: 5
    - name: Create Archive
      run: |
        cd $Env:GITHUB_WORKSPACE
        tar -a -cvf RobloxAccountManager.zip -C Test *
    - name: Create a Release
      id: create_release
      uses: actions/create-release@v1
      env: 
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: release-${{ github.sha }}
        release_name: Build
        draft: false
        prerelease: false
    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./RobloxAccountManager.zip
        asset_name: RobloxAccountManager.zip
        asset_content_type: application/zip
