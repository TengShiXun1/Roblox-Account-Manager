name: Build

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up NuGet
      uses: nuget/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore $Env:GITHUB_WORKSPACE\RBXAltManager.sln

    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v1.3.1

    - name: Build the Solution
      run: MSBuild.exe $Env:GITHUB_WORKSPACE\RBXAltManager.sln -p:Configuration=Release
      timeout-minutes: 5

    - name: Create a Release
      id: create_release
      uses: actions/create-release@v1
      env: 
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: release-${{ github.sha }}
        release_name: Build
        draft: false
        prerelease: false

    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./RobloxAccountManager.zip
        asset_name: RobloxAccountManager.zip
        asset_content_type: application/zip
